[tool.flet]
# Tên dự án (viết liền không dấu)
project_name = "auedu"
# Tên hiển thị trên điện thoại
product_name = "AuEdu"
# File chạy chính
main_module = "main"
assets_dir = "assets"

[tool.flet.android]
# Định danh duy nhất cho app
package_name = "com.nch2024.auedu"
# Phiên bản
version_code = 1
version_name = "1.0.0"

# CẤU HÌNH GIAO DIỆN KHI TẢI APP
# Đường dẫn tính từ thư mục assets
icon = "icon.png"
splash_image = "splash.png"
splash_color = "#ffffff" 

# QUYỀN TRUY CẬP (Rất quan trọng cho Camera)
permissions = [
    "CAMERA",
    "INTERNET"
]

[tool.flet.ios]
bundle_id = "com.hiep.auedu"
icon = "icon.png"
permissions = [
    "NSCameraUsageDescription: Ứng dụng cần quyền Camera để điểm danh sinh viên."
]