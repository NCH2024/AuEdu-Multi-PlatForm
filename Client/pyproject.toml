[tool.flet]
# Tên dự án (viết liền không dấu)
project_name = "auedu"
# Tên hiển thị trên điện thoại
product_name = "AuEdu"
# File chạy chính
main_module = "main"
assets_dir = "assets"

[tool.flet.android]
# Định danh duy nhất cho app
package_name = "com.nch2024.auedu"
# Phiên bản
version_code = 2
version_name = "0.2.0"

# CẤU HÌNH GIAO DIỆN KHI TẢI APP
icon = "icon.png"
splash_image = "icon-2.png"
splash_color = "#ffffff" 

# CẤU TRÚC QUYỀN MỚI CỦA FLET 0.84.0 (Rất quan trọng cho Camera và GPS)
[tool.flet.android.permission]
"android.permission.CAMERA" = true
"android.permission.INTERNET" = true
"android.permission.ACCESS_FINE_LOCATION" = true
"android.permission.ACCESS_COARSE_LOCATION" = true

[tool.flet.ios]
bundle_id = "com.hiep.auedu"
icon = "icon.png"

# Cấu trúc ghi chú quyền cho iOS (Info.plist)
[tool.flet.ios.info]
"NSCameraUsageDescription" = "Ứng dụng cần quyền Camera để điểm danh sinh viên."
"NSLocationWhenInUseUsageDescription" = "Ứng dụng cần quyền Vị trí để ghi nhận địa điểm khi điểm danh."